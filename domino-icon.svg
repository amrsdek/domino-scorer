<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1b14"/>
      <stop offset="100%" stop-color="#0f0805"/>
    </linearGradient>
    <linearGradient id="copperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a8c7a"/>
      <stop offset="50%" stop-color="#2c594c"/>
      <stop offset="100%" stop-color="#1a382f"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2c792"/>
      <stop offset="50%" stop-color="#c5a059"/>
      <stop offset="100%" stop-color="#8a6d3b"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="5" dy="10" stdDeviation="15" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
      <feFlood flood-color="#e2c792" flood-opacity="0.5"/>
      <feComposite in2="shadowDiff" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Background for app icon -->
  <rect width="512" height="512" rx="114" fill="url(#bgGrad)"/>
  
  <!-- Outer border -->
  <rect x="26" y="26" width="460" height="460" rx="90" fill="none" stroke="url(#goldGrad)" stroke-width="12" opacity="0.4"/>

  <!-- Domino Tile Base -->
  <rect x="156" y="86" width="200" height="340" rx="20" fill="url(#copperGrad)" stroke="url(#goldGrad)" stroke-width="8" filter="url(#shadow)"/>
  
  <!-- Middle Line -->
  <line x1="166" y1="256" x2="346" y2="256" stroke="url(#goldGrad)" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="12" fill="url(#goldGrad)"/>

  <!-- Top Dots (6) -->
  <circle cx="196" cy="126" r="12" fill="url(#goldGrad)" filter="url(#innerGlow)"/>
  <circle cx="196" cy="186" r="12" fill="url(#goldGrad)" filter="url(#innerGlow)"/>
  <circle cx="196" cy="246" r="12" fill="url(#goldGrad)" filter="url(#innerGlow)"/>
  
  <circle cx="316" cy="126" r="12" fill="url(#goldGrad)" filter="url(#innerGlow)"/>
  <circle cx="316" cy="186" r="12" fill="url(#goldGrad)" filter="url(#innerGlow)"/>
  <circle cx="316" cy="246" r="12" fill="url(#goldGrad)" filter="url(#innerGlow)"/>

  <!-- Bottom Dots (4) -->
  <circle cx="196" cy="306" r="12" fill="url(#goldGrad)" filter="url(#innerGlow)"/>
  <circle cx="316" cy="306" r="12" fill="url(#goldGrad)" filter="url(#innerGlow)"/>
  <circle cx="196" cy="396" r="12" fill="url(#goldGrad)" filter="url(#innerGlow)"/>
  <circle cx="316" cy="396" r="12" fill="url(#goldGrad)" filter="url(#innerGlow)"/>
</svg>
